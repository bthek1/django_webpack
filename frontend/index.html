<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <div class="mb-3">
            <input
                id="new-todo-title"
                type="text"
                class="form-control"
                placeholder="Enter a new task"
            />
            <button id="add-todo" class="btn btn-primary mt-2">Add</button>
        </div>
        <ul id="todo-list" class="list-group"></ul>
    </div>
</body>
</html>
