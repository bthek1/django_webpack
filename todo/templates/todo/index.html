{% extends "todo/base.html" %}

{% block title %}To-Do List{% endblock %}

{% block content %}
<div class="container">
    <div class="mb-3">
        <input id="new-todo" type="text" class="form-control" placeholder="Enter a new task" />
        <button id="add-todo" class="btn btn-primary mt-2">Add</button>
    </div>
    <ul id="todo-list" class="list-group"></ul>
</div>
{% endblock %}
